

services:
  api:
    build: .
    container_name: doctorhai-server
    ports:
      - "4000:4000"
    env_file:
      - .env.development
    depends_on:
      - mongo

  mongo:
    image: mongo:6
    container_name: doctorhai-mongo
    restart: unless-stopped
    command: ["--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27018:27017"
    volumes:
      - doctorhai:/data/db
    healthcheck:
      test: echo "try { rs.status() } catch (err) { rs.initiate({_id:'rs0',members:[{_id:0,host:'mongo:27017'}]}) }" | mongosh --port 27017 --quiet
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 40s

volumes:
  doctorhai: